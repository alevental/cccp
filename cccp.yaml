# CCCP project configuration
# See: https://github.com/your-org/cccp

# Directories to search for agent definitions (in priority order).
agent_paths:
  - ./agents
  - ./.claude/agents

# Named MCP server profiles.
# Each agent gets only the servers its profile specifies.
# mcp_profiles:
#   base:
#     servers:
#       qmd:
#         command: qmd
#         args: [serve, --stdio]
#   design:
#     extends: base
#     servers:
#       figma:
#         command: npx
#         args: [-y, figma-console-mcp]

# Default artifact output directory pattern.
# Supports {project} and {pipeline_name} variables.
artifact_dir: docs/projects/{project}/{pipeline_name}

# Default MCP profile applied when a stage doesn't specify one.
# default_mcp_profile: base

# Claude config directory for agent subprocesses.
# Agents inherit auth, settings, and plugins from this profile.
# Default: inherits CLAUDE_CONFIG_DIR from environment, or ~/.claude
claude_config_dir: /Users/alevental/.claude-iceman713

# Permission mode for agent subprocesses.
# Pipeline agents run non-interactively, so they need pre-granted permissions.
# Options: default, acceptEdits, bypassPermissions, auto
permission_mode: bypassPermissions
