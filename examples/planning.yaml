name: planning
description: >
  Planning pipeline with 6 sub-stages — technical scoping, architecture,
  research, master plan, sprint plans, and cross-sprint consistency check.

stages:
  - name: technical-scoping
    type: pge
    task: "Assess codebase health and identify technical constraints."
    planner:
      agent: architect
      operation: health-assessment
    generator:
      agent: architect
      operation: health-assessment
    evaluator:
      agent: reviewer
    contract:
      deliverable: "{artifact_dir}/technical-scoping.md"
      guidance: |
        Health assessment must cover dependencies, test coverage, and tech debt.
        Technical constraints and risks must be identified with mitigation strategies.
      max_iterations: 2

  - name: architecture-design
    type: pge
    task: "Design the system architecture for the feature."
    inputs:
      - "{artifact_dir}/technical-scoping.md"
    planner:
      agent: architect
    generator:
      agent: architect
    evaluator:
      agent: reviewer
    contract:
      deliverable: "{artifact_dir}/architecture.md"
      guidance: |
        System must be decomposed into independent, testable modules.
        Data flow between components must be clearly documented.
        All new/modified API endpoints must be specified.
      max_iterations: 3

  - name: implementation-research
    type: pge
    task: "Research libraries, patterns, and implementation approaches."
    inputs:
      - "{artifact_dir}/architecture.md"
    planner:
      agent: researcher
    generator:
      agent: researcher
    evaluator:
      agent: reviewer
    contract:
      deliverable: "{artifact_dir}/implementation-research.md"
      guidance: |
        Candidate libraries must be evaluated with pros/cons and recommendation.
        Implementation patterns must be cited with working examples.
      max_iterations: 2

  - name: master-plan
    type: pge
    task: "Write the master implementation plan."
    inputs:
      - "{artifact_dir}/architecture.md"
      - "{artifact_dir}/implementation-research.md"
    planner:
      agent: architect
      operation: plan-authoring
    generator:
      agent: architect
      operation: plan-authoring
    evaluator:
      agent: reviewer
    contract:
      deliverable: "{artifact_dir}/master-plan.md"
      guidance: |
        Work must be broken into sprints with clear boundaries.
        Sprint dependencies must be explicit and acyclic.
        Each sprint must identify risks and mitigation.
      max_iterations: 3

  - name: plan-approval
    type: human_gate
    prompt: "Review the master plan and sprint decomposition. Approve to begin implementation."
    artifacts:
      - "{artifact_dir}/master-plan.md"
      - "{artifact_dir}/architecture.md"
