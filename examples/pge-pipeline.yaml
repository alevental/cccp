name: pge-example
description: >
  Example pipeline demonstrating a Plan-Generate-Evaluate cycle.
  A planner writes the task plan, the evaluator writes a contract,
  the generator produces a deliverable, and the evaluator grades it.
  The generator/evaluator loop retries on FAIL.

stages:
  - name: technical-doc
    type: pge
    task: "Write a technical design document for the project's authentication system."
    planner:
      agent: agents/planner.md
    generator:
      agent: agents/writer.md
    evaluator:
      agent: agents/reviewer.md
    contract:
      deliverable: "{artifact_dir}/auth-design.md"
      guidance: |
        Document must include a threat model covering at least 3 attack vectors,
        login and token refresh flows with step-by-step sequences,
        and all auth endpoints with request/response schemas.
      max_iterations: 3
    on_fail: stop
