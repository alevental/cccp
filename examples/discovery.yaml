name: discovery
description: >
  Discovery pipeline — research the problem space, validate opportunity,
  and produce a discovery handoff document.

stages:
  - name: problem-framing
    type: agent
    description: "Brainstorm and frame the problem statement based on project context."
    agent: researcher
    output: "{artifact_dir}/problem-framing.md"

  - name: user-research
    type: pge
    description: "Research users, market, and existing solutions."
    generator:
      agent: researcher
    evaluator:
      agent: reviewer
    contract:
      deliverable: "{artifact_dir}/user-research.md"
      criteria:
        - name: user-personas
          description: "At least 2 user personas with goals, pain points, and context."
        - name: competitive-analysis
          description: "At least 3 competing solutions analyzed with strengths/weaknesses."
        - name: evidence-based
          description: "All claims backed by specific evidence or data sources."
      max_iterations: 3
    on_fail: stop

  - name: opportunity-assessment
    type: human_gate
    prompt: "Review the problem framing and user research. Approve to proceed to design."
    artifacts:
      - "{artifact_dir}/problem-framing.md"
      - "{artifact_dir}/user-research.md"
