name: implementation
description: >
  Implementation pipeline — execute a sprint with PGE per task.
  Designed as a single-sprint template; compose multiple for multi-sprint projects.

variables:
  sprint: "1"

stages:
  - name: sprint-setup
    type: agent
    task: "Read the master plan and set up the sprint working context."
    agent: architect
    operation: sprint-brief
    output: "{artifact_dir}/sprint-{sprint}-brief.md"

  - name: implement
    type: pge
    task: "Implement the sprint tasks according to the sprint brief."
    plan: "{artifact_dir}/sprint-{sprint}-brief.md"
    planner:
      agent: architect
      operation: task-planning
    generator:
      agent: implementer
    evaluator:
      agent: code-evaluator
    contract:
      deliverable: "{artifact_dir}/sprint-{sprint}-complete.md"
      guidance: |
        All tasks from the sprint brief must be implemented.
        All new and existing tests must pass.
        No regressions introduced in existing functionality.
      max_iterations: 5
    on_fail: human_gate

  - name: sprint-review
    type: pge
    task: "Review the sprint deliverables for quality and completeness."
    inputs:
      - "{artifact_dir}/sprint-{sprint}-complete.md"
    planner:
      agent: architect
      operation: sprint-review
    generator:
      agent: architect
      operation: sprint-review
    evaluator:
      agent: reviewer
    contract:
      deliverable: "{artifact_dir}/sprint-{sprint}-review.md"
      guidance: |
        Code must follow project conventions and be well-structured.
        New code must be documented where non-obvious.
      max_iterations: 2
