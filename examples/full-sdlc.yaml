name: full-sdlc
description: >
  Full software development lifecycle — discovery through retrospective.
  This is an illustrative example showing pipeline composition.
  In practice, each stage pipeline would be more detailed.

stages:
  # --- Discovery ---
  - name: problem-research
    type: pge
    task: "Research the problem space and validate the opportunity."
    planner:
      agent: researcher
    generator:
      agent: researcher
    evaluator:
      agent: reviewer
    contract:
      deliverable: "{artifact_dir}/discovery.md"
      guidance: |
        Problem statement must be clear, specific, and validated.
        Opportunity must be assessed with rough scope estimate.
      max_iterations: 2

  - name: discovery-approval
    type: human_gate
    prompt: "Review the discovery document. Approve to proceed to design."
    artifacts:
      - "{artifact_dir}/discovery.md"

  # --- Design ---
  - name: technical-design
    type: pge
    task: "Design the technical solution."
    inputs:
      - "{artifact_dir}/discovery.md"
    planner:
      agent: architect
    generator:
      agent: architect
    evaluator:
      agent: reviewer
    contract:
      deliverable: "{artifact_dir}/design.md"
      guidance: |
        System architecture must be documented with component diagram.
        API contracts must be fully specified.
        Data model changes must be documented.
      max_iterations: 3

  - name: design-approval
    type: human_gate
    prompt: "Review the technical design. Approve to proceed to planning."
    artifacts:
      - "{artifact_dir}/design.md"

  # --- Planning ---
  - name: implementation-plan
    type: pge
    task: "Create the implementation plan with sprint breakdown."
    inputs:
      - "{artifact_dir}/design.md"
    planner:
      agent: architect
      operation: plan-authoring
    generator:
      agent: architect
      operation: plan-authoring
    evaluator:
      agent: reviewer
    contract:
      deliverable: "{artifact_dir}/plan.md"
      guidance: |
        Work must be decomposed into sprints with clear deliverables.
        Each sprint must have a complexity assessment.
      max_iterations: 3

  - name: plan-approval
    type: human_gate
    prompt: "Review the implementation plan. Approve to begin implementation."
    artifacts:
      - "{artifact_dir}/plan.md"

  # --- Implementation ---
  - name: implement
    type: pge
    task: "Implement the feature according to the plan."
    plan: "{artifact_dir}/plan.md"
    planner:
      agent: architect
      operation: task-planning
    generator:
      agent: implementer
    evaluator:
      agent: code-evaluator
    contract:
      deliverable: "{artifact_dir}/implementation-complete.md"
      guidance: |
        All planned functionality must be implemented.
        Tests must be written and passing.
      max_iterations: 5
    on_fail: human_gate

  # --- QA ---
  - name: quality-assurance
    type: pge
    task: "Run quality assurance checks."
    inputs:
      - "{artifact_dir}/implementation-complete.md"
    planner:
      agent: implementer
    generator:
      agent: implementer
    evaluator:
      agent: reviewer
    contract:
      deliverable: "{artifact_dir}/qa-report.md"
      guidance: |
        Critical paths must have test coverage.
        No regressions in existing functionality.
      max_iterations: 3

  # --- Delivery ---
  - name: delivery-approval
    type: human_gate
    prompt: "QA complete. Approve for delivery."
    artifacts:
      - "{artifact_dir}/qa-report.md"

  # --- Retrospective ---
  - name: retrospective
    type: agent
    task: "Write a retrospective document covering what went well, what didn't, and improvements."
    agent: researcher
    output: "{artifact_dir}/retrospective.md"
